project:
  title: "BCD to 7-Segment Decoder"
  author: "Nguyen Van Dong Dong"
  discord: ""
  description: "A combinational 4-bit hex to 7-segment LED decoder (Common Anode)."
  language: "Verilog"
  clock_hz: 0 # Mạch tổ hợp không cần xung clock
  tiles: "1x1"
  top_module: "tt_um_nguyenvandongsn97_7seg_decoder"
