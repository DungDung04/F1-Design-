  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "Segment a"
  uo[1]: "Segment b"
  uo[2]: "Segment c"
  uo[3]: "Segment d"
  uo[4]: "Segment e"
  uo[5]: "Segment f"
  uo[6]: "Segment g"
  uo[7]: "Not used"

  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
