project:
  title: "D Flip-Flop with Asynchronous Reset"
  author: "DungDung04"
  discord: ""
  description: >
    A positive-edge triggered D Flip-Flop with an active-low asynchronous reset.
    The circuit stores the input data on each rising clock edge and immediately
    clears the output when the reset signal is asserted low.
  language: "Verilog"
  clock_hz: 50000000

  tiles: "1x1"

  top_module: "project"

  source_files:
    - "project.v"

